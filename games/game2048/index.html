<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #info {
            display: flex;
            gap: 24px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        #info span {
            color: #c084fc;
            font-weight: 700;
        }

        #board {
            display: grid;
            gap: 8px;
            padding: 10px;
            background: rgba(192, 132, 252, 0.08);
            border-radius: 12px;
            border: 2px solid rgba(192, 132, 252, 0.2);
        }

        .tile {
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            transition: all 0.12s ease;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
        }

        #msg {
            margin-top: 14px;
            font-size: 15px;
            color: #a78bfa;
            min-height: 24px;
            text-align: center;
        }

        #newBtn {
            margin-top: 10px;
            padding: 10px 28px;
            border-radius: 30px;
            background: linear-gradient(135deg, #c084fc, #818cf8);
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        #newBtn:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
    <div id="board"></div>
    <div id="msg">Swipe or use arrows</div>
    <button id="newBtn" onclick="init()">New Game</button>
    <script>
        const board = document.getElementById('board'), scoreEl = document.getElementById('score'), bestEl = document.getElementById('best'), msgEl = document.getElementById('msg');
        const N = 4; let grid, sc, best = +localStorage.getItem('2048best') || 0, won = false, over = false;
        bestEl.textContent = best;

        const colors = { 0: 'rgba(255,255,255,0.04)', 2: '#1e1b4b', 4: '#312e81', 8: '#4338ca', 16: '#4f46e5', 32: '#6366f1', 64: '#818cf8', 128: '#a78bfa', 256: '#c084fc', 512: '#d946ef', 1024: '#f472b6', 2048: '#facc15' };
        const txtColors = { 0: 'transparent', 2: '#c4b5fd', 4: '#c4b5fd', 8: '#e0e7ff', 16: '#fff', 32: '#fff', 64: '#fff', 128: '#fff', 256: '#1e1b4b', 512: '#fff', 1024: '#fff', 2048: '#1e1b4b' };

        function resize() {
            const s = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.58, 380);
            const ts = Math.floor((s - 8 * (N + 1)) / N);
            board.style.gridTemplateColumns = `repeat(${N},${ts}px)`;
            board.style.gridTemplateRows = `repeat(${N},${ts}px)`;
            board.querySelectorAll('.tile').forEach(t => { t.style.width = ts + 'px'; t.style.height = ts + 'px'; t.style.fontSize = (ts > 70 ? 28 : ts > 50 ? 22 : 18) + 'px'; });
        }

        function init() {
            grid = Array.from({ length: N }, () => Array(N).fill(0));
            sc = 0; won = false; over = false; scoreEl.textContent = 0; msgEl.textContent = 'Swipe or use arrows';
            addRandom(); addRandom(); render(); resize();
        }

        function addRandom() {
            const empty = [];
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (!grid[r][c]) empty.push([r, c]);
            if (!empty.length) return;
            const [r, c] = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            board.innerHTML = '';
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
                const v = grid[r][c], d = document.createElement('div');
                d.className = 'tile';
                d.style.background = colors[v] || 'linear-gradient(135deg,#c084fc,#f472b6)';
                d.style.color = txtColors[v] || '#fff';
                d.textContent = v || '';
                if (v >= 128) d.style.boxShadow = `0 0 20px ${colors[v] || '#c084fc'}44`;
                board.appendChild(d);
            }
            resize();
        }

        function slide(row) {
            let a = row.filter(v => v), merged = false;
            for (let i = 0; i < a.length - 1; i++) {
                if (a[i] === a[i + 1] && !merged) { a[i] *= 2; sc += a[i]; a.splice(i + 1, 1); merged = true; }
            }
            while (a.length < N) a.push(0);
            return a;
        }

        function move(dir) {
            if (over) return;
            let moved = false, prev = JSON.stringify(grid);
            if (dir === 'left') for (let r = 0; r < N; r++) grid[r] = slide(grid[r]);
            else if (dir === 'right') for (let r = 0; r < N; r++) grid[r] = slide(grid[r].reverse()).reverse();
            else if (dir === 'up') for (let c = 0; c < N; c++) { let col = []; for (let r = 0; r < N; r++) col.push(grid[r][c]); col = slide(col); for (let r = 0; r < N; r++) grid[r][c] = col[r]; }
            else if (dir === 'down') for (let c = 0; c < N; c++) { let col = []; for (let r = 0; r < N; r++) col.push(grid[r][c]); col = slide(col.reverse()).reverse(); for (let r = 0; r < N; r++) grid[r][c] = col[r]; }
            if (JSON.stringify(grid) !== prev) { moved = true; addRandom(); }
            scoreEl.textContent = sc; if (sc > best) { best = sc; localStorage.setItem('2048best', best); bestEl.textContent = best; }
            if (!won && grid.some(r => r.some(v => v >= 2048))) { won = true; msgEl.textContent = '🎉 You reached 2048!'; }
            if (!canMove()) { over = true; msgEl.textContent = 'Game Over! Tap New Game'; }
            render();
        }

        function canMove() {
            for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
                if (!grid[r][c]) return true;
                if (c < N - 1 && grid[r][c] === grid[r][c + 1]) return true;
                if (r < N - 1 && grid[r][c] === grid[r + 1][c]) return true;
            }
            return false;
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            const m = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
            if (m[e.key]) { e.preventDefault(); move(m[e.key]); }
        });

        // Swipe
        let tx, ty;
        document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
        document.addEventListener('touchend', e => {
            if (!tx) return;
            const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
            if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
            if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
            else move(dy > 0 ? 'down' : 'up');
            tx = ty = null;
        });

        window.addEventListener('resize', resize);
        init();
    </script>
</body>

</html>
