<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #info {
            display: flex;
            gap: 30px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        #info span {
            color: #c084fc;
            font-weight: 700;
        }

        canvas {
            border: 2px solid rgba(192, 132, 252, 0.3);
            border-radius: 8px;
            background: #0f0f2a;
            display: block;
            max-width: 95vw;
            max-height: 70vh;
        }

        #msg {
            margin-top: 12px;
            font-size: 15px;
            color: #a78bfa;
            min-height: 22px;
            text-align: center;
        }

        .touch-controls {
            display: none;
            margin-top: 16px;
        }

        .touch-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 4px 0;
        }

        .touch-btn {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            border: 2px solid rgba(192, 132, 252, 0.3);
            background: rgba(192, 132, 252, 0.1);
            color: #c084fc;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }

        .touch-btn:active {
            background: rgba(192, 132, 252, 0.35);
        }

        @media (pointer:coarse) {
            .touch-controls {
                display: block;
            }
        }

        @media (max-width:500px) {
            canvas {
                max-height: 55vh;
            }

            .touch-btn {
                width: 54px;
                height: 54px;
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
    <canvas id="c"></canvas>
    <div id="msg">Swipe or use arrows to play</div>
    <div class="touch-controls" id="touchCtrl">
        <div class="touch-row">
            <div class="touch-btn" data-dir="up">▲</div>
        </div>
        <div class="touch-row">
            <div class="touch-btn" data-dir="left">◀</div>
            <div class="touch-btn" data-dir="down">▼</div>
            <div class="touch-btn" data-dir="right">▶</div>
        </div>
    </div>
    <script>
        const c = document.getElementById('c'), ctx = c.getContext('2d');
        const scoreEl = document.getElementById('score'), bestEl = document.getElementById('best'), msgEl = document.getElementById('msg');
        let W, H, gs, cols, rows, snake, food, dir, ndir, sc, best = +localStorage.getItem('snakeBest') || 0, running = false, speed, loop;
        bestEl.textContent = best;

        function resize() {
            const s = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.65, 400);
            gs = Math.floor(s / 20); cols = 20; rows = 20; W = gs * cols; H = gs * rows;
            c.width = W; c.height = H;
            c.style.width = W + 'px'; c.style.height = H + 'px';
        }
        resize(); window.addEventListener('resize', () => { resize(); if (!running) drawAll(); });

        function init() {
            const mid = Math.floor(cols / 2);
            snake = [{ x: mid, y: Math.floor(rows / 2) }];
            for (let i = 1; i < 4; i++) snake.push({ x: mid + i, y: snake[0].y });
            dir = { x: -1, y: 0 }; ndir = { ...dir }; sc = 0; scoreEl.textContent = 0; speed = 120;
            placeFood(); running = true;
            msgEl.textContent = '';
            clearInterval(loop); loop = setInterval(tick, speed);
        }

        function placeFood() {
            let p; do { p = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) }; }
            while (snake.some(s => s.x === p.x && s.y === p.y));
            food = p;
        }

        function tick() {
            dir = { ...ndir };
            const h = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            if (h.x < 0 || h.x >= cols || h.y < 0 || h.y >= rows || snake.some(s => s.x === h.x && s.y === h.y)) {
                running = false; clearInterval(loop);
                if (sc > best) { best = sc; localStorage.setItem('snakeBest', best); bestEl.textContent = best; }
                msgEl.textContent = 'Game Over! Tap or press Space';
                return;
            }
            snake.unshift(h);
            if (h.x === food.x && h.y === food.y) {
                sc += 10; scoreEl.textContent = sc;
                placeFood();
                if (speed > 50) { speed -= 3; clearInterval(loop); loop = setInterval(tick, speed); }
            } else snake.pop();
            drawAll();
        }

        function drawAll() {
            ctx.fillStyle = '#0f0f2a'; ctx.fillRect(0, 0, W, H);
            // Grid
            ctx.strokeStyle = 'rgba(192,132,252,0.06)';
            for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) ctx.strokeRect(i * gs, j * gs, gs, gs);
            // Food
            ctx.fillStyle = '#f472b6'; ctx.shadowColor = '#f472b6'; ctx.shadowBlur = 12;
            ctx.beginPath(); ctx.arc(food.x * gs + gs / 2, food.y * gs + gs / 2, gs / 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            // Snake
            snake.forEach((s, i) => {
                const t = i / snake.length;
                ctx.fillStyle = `hsl(${270 - t * 40},${80 - t * 20}%,${70 - t * 20}%)`;
                ctx.shadowColor = i === 0 ? '#c084fc' : 'transparent'; ctx.shadowBlur = i === 0 ? 10 : 0;
                const p = 2; ctx.beginPath();
                ctx.roundRect(s.x * gs + p, s.y * gs + p, gs - p * 2, gs - p * 2, 4); ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        // Keyboard
        document.addEventListener('keydown', e => {
            if (!running && (e.key === ' ' || e.key === 'Enter')) { init(); return; }
            const m = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 }, ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 }, w: { x: 0, y: -1 }, s: { x: 0, y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 } };
            if (m[e.key] && !(m[e.key].x === -dir.x && m[e.key].y === -dir.y)) { ndir = m[e.key]; e.preventDefault(); }
        });

        // Swipe
        let tx, ty;
        document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
        document.addEventListener('touchend', e => {
            if (!tx) return;
            const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
            if (Math.abs(dx) < 15 && Math.abs(dy) < 15) { if (!running) init(); return; }
            if (Math.abs(dx) > Math.abs(dy)) {
                const d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
                if (!(d.x === -dir.x && d.y === -dir.y)) ndir = d;
            } else {
                const d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
                if (!(d.x === -dir.x && d.y === -dir.y)) ndir = d;
            }
            tx = ty = null;
        }, { passive: false });

        // Touch buttons
        document.querySelectorAll('.touch-btn').forEach(b => {
            b.addEventListener('touchstart', e => {
                e.preventDefault(); e.stopPropagation();
                if (!running) { init(); return; }
                const m = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };
                const d = m[b.dataset.dir];
                if (d && !(d.x === -dir.x && d.y === -dir.y)) ndir = d;
            }, { passive: false });
        });

        drawAll(); init();
    </script>
</body>

</html>
